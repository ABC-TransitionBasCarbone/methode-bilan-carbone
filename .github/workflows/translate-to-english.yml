name: Translate FR to EN

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
  workflow_dispatch:
    inputs:
      files:
        description: "Fichiers à traduire (chemins relatifs séparés par des espaces)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branche FR (source)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          path: fr

      - name: Checkout branche EN (cible)
        uses: actions/checkout@v4
        with:
          ref: translated-en
          path: en

      - name: Détecter les fichiers modifiés
        id: diff
        working-directory: fr
        run: |
          if [ -n "${{ github.event.inputs.files }}" ]; then
            FILES="${{ github.event.inputs.files }}"
          else
            FILES=$(git diff --name-only HEAD~1 HEAD -- '*.md' | tr '\n' ' ')
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Traduire avec l'API Anthropic
        if: steps.diff.outputs.files != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FILES: ${{ steps.diff.outputs.files }}
        run: |
          pip install anthropic --quiet
          python3 - <<'PYEOF'
          import anthropic
          import os
          import pathlib

          client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])
          files = os.environ["FILES"].split()

          SYSTEM = """Tu es traducteur technique français → anglais pour la documentation
          de l'Association pour la transition Bas Carbone (ABC) — méthode Bilan Carbone®.

          Règles impératives :
          - Traduis uniquement le texte visible. Ne traduis jamais l'intérieur des blocs de code.
          - Préserve exactement la syntaxe GitBook : {% hint %}, {% tabs %}, {% details %}, tableaux, cards, liens.
          - Copie les balises <figure>, <img ...> et tout emoji exactement tels quels.
          - Conserve la même structure de titres (même nombre de #).
          - "Bilan Carbone®" ne se traduit pas. Conserve aussi les sigles : ADEME, ABC, CSRD, GHG, ISO.
          - "GES" se traduit par "GHG", sauf quand il fait partie d'un sigle composé comme "BEGES-r" (à conserver tel quel).
          - Si le fichier est SUMMARY.md, traduis uniquement les titres affichés, jamais les chemins entre parenthèses.
          - Réponds uniquement avec le contenu traduit du fichier, sans commentaire ni balise supplémentaire."""

          for rel_path in files:
              rel_path = rel_path.strip()
              if not rel_path.endswith('.md'):
                  continue
              fr_path = pathlib.Path('fr') / rel_path
              en_path = pathlib.Path('en') / rel_path
              if not fr_path.exists():
                  print(f"Skipping {rel_path}: not found in fr/")
                  continue
              content = fr_path.read_text(encoding='utf-8')
              print(f"Translating {rel_path} ({len(content)} chars)...")
              response = client.messages.create(
                  model="claude-sonnet-4-6",
                  max_tokens=8192,
                  system=SYSTEM,
                  messages=[{"role": "user", "content": f"Traduis ce fichier markdown en anglais :\n\n{content}"}]
              )
              translated = response.content[0].text
              en_path.parent.mkdir(parents=True, exist_ok=True)
              en_path.write_text(translated, encoding='utf-8')
              print(f"  → Written to {en_path}")
          PYEOF

      - name: Commit et push vers translated-en
        working-directory: en
        run: |
          git config user.name "claude-translate-bot"
          git config user.email "actions@github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Translate updated pages to English"
            git push origin translated-en
          else
            echo "Rien à committer"
          fi

